# \u541b\u541b\u4efb\u52a1\u6a21\u578b\u914d\u7f6e\uff08\u7b80\u5316\u7248\uff1a\u4ece .env \u8bfb base_url/api_key\uff09
# \u6bcf\u4e2a\u4efb\u52a1\u69fd\u914d\u7f6e\uff1abase_url_env + model_env + api_key_env + temperature + max_tokens
# \u540e\u7eed\u6362\u6a21\u578b\uff0c\u53ea\u9700\u4fee\u6539 .env \u4e2d\u7684 LLM_BASE_URL / LLM_MODEL / LLM_API_KEY

[task.gate]
# L2 \u8bed\u4e49\u95e8\uff1a\u5c0f\u6a21\u578b\uff0c\u5224\u65ad reply / no_reply / no_reply_until_call
temperature = 0.1
max_tokens = 128
base_url_env = "LLM_BASE_URL"
model_env = "LLM_MODEL"
api_key_env = "LLM_API_KEY"

[task.agent]
# \u4e3b Agent\uff1a\u5fc5\u987b\u652f\u6301 function calling
temperature = 0.8
max_tokens = 2048
base_url_env = "LLM_BASE_URL"
model_env = "LLM_MODEL"
api_key_env = "LLM_API_KEY"

[task.utils]
# \u6742\u9879\u5c0f\u4efb\u52a1\uff08\u9891\u7387\u8bc4\u4f30/\u6458\u8981\u7b49\uff09
temperature = 0.3
max_tokens = 512
base_url_env = "LLM_BASE_URL"
model_env = "LLM_MODEL"
api_key_env = "LLM_API_KEY"
